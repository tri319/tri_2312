<!DOCTYPE html>
<html lang="en">
<head>
    <title>Vigenere Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>

<body>
    <div class="container mt-4">

        <table class="table">

            <tr>
                <td style="text-align: center; font-weight: bold; font-size: 25px;">
                    VIGENERE CIPHER
                </td>
            </tr>

            <tr>
                <td style="font-weight: bold; color: blue">
                    ENCRYPTION
                </td>
            </tr>

            <tr>
                <td>
                    <form method="POST" action="/vigenere">

                        <div class="mb-3">
                            <label>Plain text:</label>
                            <input
                                type="text"
                                class="form-control"
                                name="inputPlainText"
                                placeholder="Input Plain Text"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label>Key (Word):</label>
                            <input
                                type="text"
                                class="form-control"
                                name="inputKeyPlain"
                                placeholder="Input Key (Word)"
                                required
                            >
                        </div>

                        <button
                            type="submit"
                            name="encrypt"
                            class="btn btn-primary">
                            Encrypt
                        </button>

                    </form>
                </td>
            </tr>


            <tr>
                <td style="font-weight: bold; color: blue">
                    DECRYPTION
                </td>
            </tr>

            <tr>
                <td>
                    <form method="POST" action="/vigenere">

                        <div class="mb-3">
                            <label>Cipher text:</label>
                            <input
                                type="text"
                                class="form-control"
                                name="inputCipherText"
                                placeholder="Input Cipher Text"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label>Key (Word):</label>
                            <input
                                type="text"
                                class="form-control"
                                name="inputKeyCipher"
                                placeholder="Input Key (Word)"
                                required
>
                        </div>

                        <button
                            type="submit"
                            name="decrypt"
                            class="btn btn-success">
                            Decrypt
                        </button>

                    </form>
                </td>
            </tr>

        </table>


        {% if result %}
            <div class="alert alert-success mt-3">
                <strong>Result:</strong> {{ result }}
            </div>
        {% endif %}

    </div>
</body>
</html>
