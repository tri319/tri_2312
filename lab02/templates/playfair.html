<!DOCTYPE html>
<html lang="en">

<head>
    <title>Playfair Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>

<body>

<div class="container mt-4">

    <table class="table">

        <tr>
            <td style="text-align:center; font-weight:bold; font-size:25px;">
                PLAYFAIR CIPHER
            </td>
        </tr>


        <!-- ENCRYPTION -->
        <tr>
            <td style="font-weight:bold; color:blue;">
                ENCRYPTION
            </td>
        </tr>

        <tr>
            <td>

                <form method="POST" action="/playfair">

                    <div class="mb-3">
                        <label>Plain text:</label>
                        <input
                            type="text"
                            class="form-control"
                            name="inputPlainText"
                            placeholder="Input Plain Text"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label>Keyword:</label>
                        <input
                            type="text"
                            class="form-control"
                            name="inputKeyPlain"
                            placeholder="Input Key (Word)"
                            required
                        >
                    </div>

                    <!-- BUTTON GROUP -->
                    <button
                        type="submit"
                        name="encrypt"
                        class="btn btn-primary"
                    >
                        Encrypt
                    </button>

                    <button
                        type="submit"
                        name="create_matrix"
                        class="btn btn-dark"
                    >
                        Create Matrix
                    </button>

                </form>

            </td>
        </tr>


        <!-- DECRYPTION -->
        <tr>
            <td style="font-weight:bold; color:blue;">
                DECRYPTION
            </td>
        </tr>

        <tr>
            <td>

                <form method="POST" action="/playfair">

                    <div class="mb-3">
                        <label>Cipher text:</label>
                        <input
                            type="text"
                            class="form-control"
                            name="inputCipherText"
                            placeholder="Input Cipher Text"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label>Keyword:</label>
                        <input
                            type="text"
                            class="form-control"
                            name="inputKeyCipher"
placeholder="Input Key (Word)"
                            required
                            auto focus
                        >
                    </div>

                    <button
                        type="submit"
                        name="decrypt"
                        class="btn btn-success"
                    >
                        Decrypt
                    </button>

                </form>

            </td>
        </tr>

    </table>



    <!-- RESULT -->
    {% if result %}
        <div class="alert alert-success mt-3">
            <strong>Result:</strong> {{ result }}
        </div>
    {% endif %}



    <!-- MATRIX -->
    {% if matrix %}
        <div class="mt-4">

            <h4 class="text-center">
                Playfair Matrix
            </h4>

            <table class="table table-bordered text-center w-50 mx-auto">

                {% for row in matrix %}
                    <tr>
                        {% for col in row %}
                            <td style="font-size:20px; font-weight:bold;">
                                {{ col }}
                            </td>
                        {% endfor %}
                    </tr>
                {% endfor %}

            </table>

        </div>
    {% endif %}

</div>

</body>
</html>
